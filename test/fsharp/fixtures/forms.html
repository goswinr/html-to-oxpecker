<form action="/submit" method="post">
  <label for="email">Email</label>
  <input type="email" id="email" name="email" placeholder="you@example.com" maxlength="50" required>
  <textarea rows="4" cols="20" readonly>hello</textarea>
  <select multiple>
    <option value="a" selected>A</option>
    <option value="b" disabled>B</option>
  </select>
  <button type="submit" disabled data-track="go" aria-label="send">Send <b>now</b></button>
  <a href="/home" tabindex="2" rel="noopener" target="_blank">Home</a>
</form>
